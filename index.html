<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fábrica de Botões - Mobile</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f8fafc;
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --accent: #10b981;
      --border: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 1.4rem;
      color: var(--primary);
      margin-bottom: 2px;
    }

    header p {
      color: #94a3b8;
      font-size: 0.75rem;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stats-box {
      background: rgba(15, 23, 42, 0.6);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .stats-box h2 {
      font-size: 0.8rem;
      color: #cbd5e1;
      margin-bottom: 2px;
    }

    .stats-value {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent);
    }

    /* Seletor de Design / Estilo Gráfico do Botão */
    .style-selector-section {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
    }

    .style-selector-section h3 {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .style-options {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .style-opt-btn {
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 2px;
      font-size: 0.7rem;
      color: #cbd5e1;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .style-opt-btn.selected {
      background: var(--primary);
      color: #0f172a;
      border-color: var(--primary);
      font-weight: bold;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    }

    .shop-section h3 {
      font-size: 0.8rem;
      margin-bottom: 4px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .shop-items {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 140px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .shop-items::-webkit-scrollbar {
      width: 4px;
    }

    .shop-items::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .upgrade-btn {
      background: #334155;
      color: #fff;
      border: none;
      padding: 6px 8px;
      border-radius: 6px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 1px;
      transition: background 0.1s;
    }

    .upgrade-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-title {
      font-weight: bold;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
    }

    .upgrade-desc {
      font-size: 0.65rem;
      color: #94a3b8;
    }

    .factory-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .factory-screen {
      width: 100%;
      height: 200px;
      background: #090d16;
      border: 2px dashed var(--border);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .factory-placeholder {
      color: #475569;
      font-size: 0.8rem;
      text-align: center;
      pointer-events: none;
      padding: 0 10px;
    }

    .bank-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .bank-screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    .bank-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      width: 100%;
      max-width: 280px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bank-text {
      font-size: 0.85rem;
      color: #f8fafc;
      line-height: 1.4;
    }

    .bank-close-btn {
      background: var(--primary);
      color: #0f172a;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .btn-create {
      background: var(--primary);
      color: #0f172a;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(56, 189, 248, 0.4);
      width: 100%;
      text-align: center;
      transition: background 0.1s, transform 0.1s;
    }

    .btn-create:active {
      transform: scale(0.96);
      background: var(--primary-hover);
    }

    /* Designs Gráficos Avançados para os Botões Gerados */
    .spawned-button {
      position: absolute;
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: bold;
      cursor: pointer;
      animation: popIn 0.2s ease-out forwards;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 0.3px;
    }

    /* Estilo 1: Neon Moderno */
    .style-neon {
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: #0f172a;
      border: 1px solid #7dd3fc;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.6), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    /* Estilo 2: Cyberpunk / Gaming */
    .style-cyber {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #ffffff;
      border-left: 3px solid #f59e0b;
      border-top: none; border-right: none; border-bottom: none;
      border-radius: 4px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
      text-transform: uppercase;
    }

    /* Estilo 3: Glassmorphism Translúcido */
    .style-glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* Estilo 4: Retro 3D Clássico */
    .style-retro {
      background: linear-gradient(to bottom, #f59e0b, #d97706);
      color: #ffffff;
      border: 2px solid #b45309;
      border-radius: 6px;
      box-shadow: 0 3px 0 #92400e, 0 4px 6px rgba(0,0,0,0.3);
      text-shadow: 0 1px 1px rgba(0,0,0,0.5);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Fábrica de Botões</h1>
    <p>Toque, produza e gerencie sua linha mobile!</p>
  </header>

  <div class="game-container">
    <div class="stats-grid">
      <div class="stats-box">
        <h2>Seus Lucros</h2>
        <div class="stats-value" id="moneyDisplay">R$ 0,00</div>
      </div>
      <div class="stats-box">
        <h2>Botões</h2>
        <div class="stats-value" id="buttonsCount" style="color: var(--primary);">0</div>
      </div>
    </div>

    <!-- Seletor de Design Gráfico -->
    <div class="style-selector-section">
      <h3>Design Gráfico do Botão</h3>
      <div class="style-options">
        <button class="style-opt-btn selected" id="opt-neon" onclick="setButtonStyle('neon')">Neon</button>
        <button class="style-opt-btn" id="opt-cyber" onclick="setButtonStyle('cyber')">Cyber</button>
        <button class="style-opt-btn" id="opt-glass" onclick="setButtonStyle('glass')">Glass</button>
        <button class="style-opt-btn" id="opt-retro" onclick="setButtonStyle('retro')">Retro</button>
      </div>
    </div>

    <div class="shop-section">
      <h3>Loja & Automação</h3>
      <div class="shop-items">
        <button class="upgrade-btn" id="upgradeClick" onclick="buyUpgrade('click')">
          <span class="upgrade-title"><span>+1 Botão por Toque</span> <span id="costClick">R$ 15</span></span>
          <span class="upgrade-desc">Aumenta a força da sua mão de obra.</span>
        </button>

        <button class="upgrade-btn" id="upgradeAuto" onclick="buyUpgrade('auto')">
          <span class="upgrade-title"><span>Robô Estagiário (1/s)</span> <span id="costAuto">R$ 50</span></span>
          <span class="upgrade-desc">Cria botões automaticamente.</span>
        </button>

        <button class="upgrade-btn" id="upgradeValue" onclick="buyUpgrade('value')">
          <span class="upgrade-title"><span>Design Premium (+R$ val)</span> <span id="costValue">R$ 100</span></span>
          <span class="upgrade-desc">Cada botão vale mais dinheiro.</span>
        </button>

        <button class="upgrade-btn" id="upgradeSênior" onclick="buyUpgrade('sênior')">
          <span class="upgrade-title"><span>Dev Sênior (8/s)</span> <span id="costSênior">R$ 400</span></span>
          <span class="upgrade-desc">Gera botões em escala industrial.</span>
        </button>

        <button class="upgrade-btn" id="upgradeAI" onclick="buyUpgrade('ai')">
          <span class="upgrade-title"><span>IA de Automação (40/s)</span> <span id="costAI">R$ 2000</span></span>
          <span class="upgrade-desc">Gera centenas de classes por segundo.</span>
        </button>

        <button class="upgrade-btn" id="upgradeCrit" onclick="buyUpgrade('crit')">
          <span class="upgrade-title"><span>Refatoração Crítica (Crit)</span> <span id="costCrit">R$ 350</span></span>
          <span class="upgrade-desc">Chance de o toque gerar o dobro.</span>
        </button>

        <button class="upgrade-btn" id="upgradeMulti" onclick="buyUpgrade('multi')">
          <span class="upgrade-title"><span>Framework CSS (+5x Valor)</span> <span id="costMulti">R$ 1200</span></span>
          <span class="upgrade-desc">Multiplica o valor de cada botão.</span>
        </button>

        <button class="upgrade-btn" id="upgradeSacar" onclick="sacarDinheiro()" style="background: #065f46;">
          <span class="upgrade-title"><span>Sacar Dinheiro (Nubank)</span></span>
          <span class="upgrade-desc">Tenta transferir os lucros para o banco.</span>
        </button>
      </div>
    </div>

    <div class="factory-area">
      <div class="factory-screen" id="factoryScreen">
        <span class="factory-placeholder" id="placeholderText">Os botões gerados aparecerão aqui...</span>
        
        <div class="bank-screen" id="bankScreen">
          <div class="bank-box">
            <div class="bank-text">Ah, se fosse tão fácil assim, nós dois já estaríamos milionários gerando botões! 😂</div>
            <button class="bank-close-btn" onclick="fecharTelaSaque()">Voltar ao Jogo</button>
          </div>
        </div>
      </div>

      <button class="btn-create" onclick="spawnButtonManual()">Criar Botão 🛠️</button>
    </div>
  </div>

  <script>
    let game = {
      money: 0,
      totalButtons: 0,
      clickPower: 1,
      autoRate: 0,
      buttonValue: 1,
      critChance: 0,
      multiBonus: 1,
      selectedStyle: 'neon', // Estilo padrão selecionado
      
      costs: {
        click: 15,
        auto: 50,
        value: 100,
        sênior: 400,
        ai: 2000,
        crit: 350,
        multi: 1200
      }
    };

    const moneyDisplay = document.getElementById('moneyDisplay');
    const buttonsCount = document.getElementById('buttonsCount');
    const factoryScreen = document.getElementById('factoryScreen');
    const placeholderText = document.getElementById('placeholderText');
    const bankScreen = document.getElementById('bankScreen');

    const costClick = document.getElementById('costClick');
    const costAuto = document.getElementById('costAuto');
    const costValue = document.getElementById('costValue');
    const costSênior = document.getElementById('costSênior');
    const costAI = document.getElementById('costAI');
    const costCrit = document.getElementById('costCrit');
    const costMulti = document.getElementById('costMulti');

    const upgradeClickBtn = document.getElementById('upgradeClick');
    const upgradeAutoBtn = document.getElementById('upgradeAuto');
    const upgradeValueBtn = document.getElementById('upgradeValue');
    const upgradeSêniorBtn = document.getElementById('upgradeSênior');
    const upgradeAIBtn = document.getElementById('upgradeAI');
    const upgradeCritBtn = document.getElementById('upgradeCrit');
    const upgradeMultiBtn = document.getElementById('upgradeMulti');

    function setButtonStyle(styleName) {
      game.selectedStyle = styleName;
      
      // Atualiza visual dos botões de seleção de design
      document.querySelectorAll('.style-opt-btn').forEach(btn => {
        btn.classList.remove('selected');
      });
      document.getElementById(`opt-${styleName}`).classList.add('selected');
    }

    function updateUI() {
      moneyDisplay.innerText = `R$ ${game.money.toFixed(2)}`;
      buttonsCount.innerText = game.totalButtons;

      costClick.innerText = `R$ ${game.costs.click}`;
      costAuto.innerText = `R$ ${game.costs.auto}`;
      costValue.innerText = `R$ ${game.costs.value}`;
      costSênior.innerText = `R$ ${game.costs.sênior}`;
      costAI.innerText = `R$ ${game.costs.ai}`;
      costCrit.innerText = `R$ ${game.costs.crit}`;
      costMulti.innerText = `R$ ${game.costs.multi}`;

      upgradeClickBtn.disabled = game.money < game.costs.click;
      upgradeAutoBtn.disabled = game.money < game.costs.auto;
      upgradeValueBtn.disabled = game.money < game.costs.value;
      upgradeSêniorBtn.disabled = game.money < game.costs.sênior;
      upgradeAIBtn.disabled = game.money < game.costs.ai;
      upgradeCritBtn.disabled = game.money < game.costs.crit || game.critChance >= 50;
      upgradeMultiBtn.disabled = game.money < game.costs.multi;
      
      if (game.critChance >= 50) {
        document.getElementById('costCrit').innerText = 'MÁX';
      }
    }

    function createButtonElement() {
      if (placeholderText) {
        placeholderText.style.display = 'none';
      }

      const btnEl = document.createElement('button');
      btnEl.className = `spawned-button style-${game.selectedStyle}`;
      btnEl.innerText = `⚡ btn-${game.totalButtons}`;

      const maxX = Math.max(10, factoryScreen.clientWidth - 80);
      const maxY = Math.max(10, factoryScreen.clientHeight - 35);
      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      btnEl.style.left = `${randomX}px`;
      btnEl.style.top = `${randomY}px`;

      btnEl.onclick = function(e) {
        e.stopPropagation();
        game.money += (game.buttonValue * game.multiBonus) * 1.5;
        if (factoryScreen.contains(btnEl)) {
          factoryScreen.removeChild(btnEl);
        }
        
        const elementsCount = factoryScreen.querySelectorAll('.spawned-button').length;
        if (elementsCount === 0) {
          placeholderText.style.display = 'block';
        }
        updateUI();
      };

      factoryScreen.appendChild(btnEl);

      const spawnedButtons = factoryScreen.querySelectorAll('.spawned-button');
      if (spawnedButtons.length > 20) {
        factoryScreen.removeChild(spawnedButtons[0]);
      }
    }

    function spawnButtonManual() {
      let multiplier = 1;
      if (game.critChance > 0 && Math.random() * 100 < game.critChance) {
        multiplier = 2;
      }

      const totalSpawn = game.clickPower * multiplier;
      for (let i = 0; i < totalSpawn; i++) {
        game.totalButtons++;
        game.money += game.buttonValue * game.multiBonus;
        createButtonElement();
      }
      updateUI();
    }

    function buyUpgrade(type) {
      if (type === 'click' && game.money >= game.costs.click) {
        game.money -= game.costs.click;
        game.clickPower += 1;
        game.costs.click = Math.floor(game.costs.click * 1.6);
      } else if (type === 'auto' && game.money >= game.costs.auto) {
        game.money -= game.costs.auto;
        game.autoRate += 1;
        game.costs.auto = Math.floor(game.costs.auto * 1.7);
      } else if (type === 'value' && game.money >= game.costs.value) {
        game.money -= game.costs.value;
        game.buttonValue += 1;
        game.costs.value = Math.floor(game.costs.value * 1.8);
      } else if (type === 'sênior' && game.money >= game.costs.sênior) {
        game.money -= game.costs.sênior;
        game.autoRate += 8;
        game.costs.sênior = Math.floor(game.costs.sênior * 1.85);
      } else if (type === 'ai' && game.money >= game.costs.ai) {
        game.money -= game.costs.ai;
        game.autoRate += 40;
        game.costs.ai = Math.floor(game.costs.ai * 1.95);
      } else if (type === 'crit' && game.money >= game.costs.crit && game.critChance < 50) {
        game.money -= game.costs.crit;
        game.critChance += 10;
        game.costs.crit = Math.floor(game.costs.crit * 2.2);
      } else if (type === 'multi' && game.money >= game.costs.multi) {
        game.money -= game.costs.multi;
        game.multiBonus *= 5;
        game.costs.multi = Math.floor(game.costs.multi * 3.5);
      }
      updateUI();
    }

    function sacarDinheiro() {
      bankScreen.classList.add('active');
    }

    function fecharTelaSaque() {
      bankScreen.classList.remove('active');
    }

    setInterval(() => {
      if (game.autoRate > 0) {
        for (let i = 0; i < game.autoRate; i++) {
          game.totalButtons++;
          game.money += game.buttonValue * game.multiBonus;
          createButtonElement();
        }
        updateUI();
      }
    }, 1000);

    updateUI();
  </script>
</body>
</html>
